# pytest_local.ini — local overrides (gitignored, per-developer)
#
# Settings here override pytest.ini for THIS machine only.
# DO NOT commit this file. Add to .gitignore: pytest_local.ini
#
# Precedence: CLI args > pytest_local.ini > pytest.ini

[pytest]
# Standard pytest ini options — uncomment to override pytest.ini:
# addopts = -v --maxfail=3
# log_cli = true
# log_cli_level = DEBUG
# testpaths = tests
# markers =
#     local: marks tests as local-only (run with -m local)
# filterwarnings =
#     ignore::DeprecationWarning

[pytest_local]
# Convenience toggles for this plugin:
#   enabled = true  →  enables log_cli + log_cli_level=DEBUG automatically
enabled = true
